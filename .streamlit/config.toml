[server]
maxUploadSize = 10000
enableStaticServing = true
# Tắt theo dõi thay đổi file (chỉ cần khi dev) — giảm CPU nền & tăng tốc rerun trên Cloud
fileWatcherType = "none"
runOnSave = false
headless = true
# TẮT nén WebSocket — HF Spaces proxy (Nginx) không hỗ trợ per-message deflate
# enableWebsocketCompression = true gây màn hình đen khi F5 hoặc mở máy khác
enableWebsocketCompression = false
[browser]
# Bỏ gửi thống kê sử dụng — bớt 1 request mạng mỗi lần tải trang
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[runner]
# Ngắt ngay script cũ khi có tương tác/F5 mới — phản hồi tức thì
fastReruns = true

[theme]
base = "dark"
