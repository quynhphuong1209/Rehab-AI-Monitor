name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  production-gate:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-prod.txt
            requirements-dev.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements-prod.txt -r requirements-dev.txt

      - name: Backend compile and unit tests
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m compileall backend auth cloud models storage video utils scripts tests
          .\.venv\Scripts\python.exe -m pytest tests\unit
          .\.venv\Scripts\python.exe scripts\migrate_json_to_sqlite.py --repo-root . --dry-run

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Frontend lint/build/smoke
        shell: pwsh
        run: |
          cd web
          npm ci
          npm run lint
          npm run build
          npx playwright install chromium
          npm run e2e:smoke

  sync:
    needs: production-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Khong tai Git LFS — tranh loi "exceeded its LFS budget" (CSV/video da luu tren HF Dataset)
          lfs: false

      - name: Install Git Xet (binary files on HF Spaces)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sh
          git xet install

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Tao mot nhanh doc lap khong co lich su cu de loai bo file whl lon khoi lich su git
          git checkout --orphan temp-hf-branch
          
          # Xoa file whl neu no con xuat hien trong git index
          git rm --cached mediapipe-0.10.14-cp310-cp310-win_amd64.whl || true
          
          # Add toan bo code sach (tu dong bo qua cac file trong .gitignore)
          git add -A
          git commit -m "deploy clean version to huggingface spaces"
          
          # Day de len nhanh main cua Hugging Face — retry khi HF tra 429 (rate limit)
          HF_REMOTE="https://quynhphuong1209:$HF_TOKEN@huggingface.co/spaces/quynhphuong1209/Rehab-AI-Monitor-2026"
          for attempt in 1 2 3 4 5 6; do
            if git push --force "$HF_REMOTE" temp-hf-branch:main; then
              echo "Push thanh cong (lan $attempt)"
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              # Tang thoi gian cho theo fibonacci-style: 60 120 180 300 420s
              wait_secs=$((attempt * 60 + (attempt > 2 ? (attempt - 2) * 60 : 0)))
              echo "Push that bai (co the 429 rate limit). Cho ${wait_secs}s roi thu lai..."
              sleep "$wait_secs"
            fi
          done
          echo "Push that bai sau 6 lan thu — vao GitHub Actions chay lai 'workflow_dispatch' thu cong."
          exit 1
