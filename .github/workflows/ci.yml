name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit, build, and smoke gates
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-prod.txt
            requirements-dev.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements-prod.txt -r requirements-dev.txt

      - name: Compile backend Python
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall backend auth cloud models storage video utils scripts tests

      - name: Run backend unit tests
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest tests\unit

      - name: Run migration dry-run
        shell: pwsh
        run: .\.venv\Scripts\python.exe scripts\migrate_json_to_sqlite.py --repo-root . --dry-run

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install chromium

      - name: Run Playwright smoke
        working-directory: web
        env:
          CI: "1"
        run: npm run e2e:smoke
